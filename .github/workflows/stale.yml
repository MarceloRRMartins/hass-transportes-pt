name: Stale Issues

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            Esta issue não tem atividade há 30 dias. Será fechada em 7 dias se não houver resposta.
            Se o problema persiste, adiciona um comentário com informação atualizada.
          stale-pr-message: |
            Este PR não tem atividade há 14 dias. Será fechado em 7 dias se não houver atualização.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,in-progress,help-wanted"
          exempt-pr-labels: "pinned,in-progress"
